<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像合成チェック</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  width: min(95vw, 1200px);
  aspect-ratio: 16 / 9;
  position: relative;
  background: #222;
  border-radius: 16px;
  overflow: hidden;
  margin-top: 20px;
}

#userImage {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}

#overlayImage {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  z-index: 10;
}

.dpad {
  position: absolute;
  bottom: 15px;
  right: 15px;
  display: grid;
  grid-template-columns: 50px 50px 50px;
  grid-template-rows: 50px 50px 50px;
  gap: 5px;
  z-index: 20;
}

.dpad button {
  font-size: 18px;
  cursor: pointer;
}

.empty {
  visibility: hidden;
}

.controls {
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>画像合成チェック</h2>

<div class="card" id="card">
  <img id="userImage">
  <img id="overlayImage" src="1ss.png">

  <div class="dpad">
    <div class="empty"></div>
    <button data-x="0" data-y="-1">↑</button>
    <div class="empty"></div>

    <button data-x="-1" data-y="0">←</button>
    <div class="empty"></div>
    <button data-x="1" data-y="0">→</button>

    <div class="empty"></div>
    <button data-x="0" data-y="1">↓</button>
    <div class="empty"></div>
  </div>
</div>

<div class="controls">
  <input type="file" id="fileInput" accept="image/*">
</div>

<script>
const fileInput = document.getElementById('fileInput');
const userImage = document.getElementById('userImage');
const card = document.getElementById('card');
const buttons = document.querySelectorAll('.dpad button');

let imgX = 0, imgY = 0;
let imgW = 0, imgH = 0;
let interval = null;

function fitImage() {
  const cardW = card.clientWidth;
  const cardH = card.clientHeight;

  const imgRatio = userImage.naturalWidth / userImage.naturalHeight;
  const cardRatio = cardW / cardH;

  if (imgRatio > cardRatio) {
    imgH = cardH;
    imgW = imgH * imgRatio;
  } else {
    imgW = cardW;
    imgH = imgW / imgRatio;
  }

  imgX = (cardW - imgW) / 2;
  imgY = (cardH - imgH) / 2;

  applyTransform();
}

function applyTransform() {
  userImage.style.width = imgW + 'px';
  userImage.style.height = imgH + 'px';
  userImage.style.left = imgX + 'px';
  userImage.style.top = imgY + 'px';
}

function clampPosition() {
  const cardW = card.clientWidth;
  const cardH = card.clientHeight;

  if (imgW > cardW) {
    imgX = Math.min(0, Math.max(cardW - imgW, imgX));
  } else {
    imgX = (cardW - imgW) / 2;
  }

  if (imgH > cardH) {
    imgY = Math.min(0, Math.max(cardH - imgH, imgY));
  } else {
    imgY = (cardH - imgH) / 2;
  }
}

function move(dx, dy) {
  imgX += dx;
  imgY += dy;
  clampPosition();
  applyTransform();
}

// 長押し対応
buttons.forEach(btn => {
  const dx = Number(btn.dataset.x);
  const dy = Number(btn.dataset.y);

  btn.addEventListener('mousedown', () => {
    move(dx, dy);
    interval = setInterval(() => move(dx, dy), 16); // 約60fps
  });

  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
});

function stop() {
  clearInterval(interval);
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    userImage.src = ev.target.result;
    userImage.onload = fitImage;
  };
  reader.readAsDataURL(file);
});

window.addEventListener('resize', () => {
  if (userImage.src) fitImage();
});
</script>

</body>
</html>

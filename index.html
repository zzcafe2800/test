<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像合成プレビュー</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .card {
    width: 80vw;
    height: 80vh;
    max-width: 900px;
    max-height: 900px;
    position: relative;
    background: #222;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  .bg-image, .overlay-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .controls {
    margin-top: 20px;
  }

  input {
    margin: 5px;
  }
</style>
</head>
<body>

<h2>画像合成チェックツール</h2>

<div class="card">
  <!-- ユーザー画像（下） -->
  <img id="userImage" class="bg-image" src="" alt="">

  <!-- 1ss.png（上・透明部分あり） -->
  <img id="overlayImage" class="overlay-image" src="1ss.png" alt="">
</div>

<div class="controls">
  <label>背景画像を読み込む：</label>
  <input type="file" id="fileInput" accept="image/*">
</div>

<script>
const fileInput = document.getElementById('fileInput');
const userImage = document.getElementById('userImage');

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    userImage.src = event.target.result;
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>

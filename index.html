<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像合成チェック</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ← 正確な16:9（1920×1080） */
.card {
  width: min(95vw, 1200px);
  aspect-ratio: 16 / 9;
  position: relative;
  background: #222;
  border-radius: 16px;
  overflow: hidden;
  margin-top: 20px;
}

/* 下の画像 */
#userImage {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* 上の透過画像（必ず前面） */
#overlayImage {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain; /* ← 全体見せる */
  pointer-events: none;
  z-index: 10;
}

.controls {
  margin-top: 15px;
  text-align: center;
}

button {
  margin: 5px;
  padding: 10px 15px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>画像合成チェック</h2>

<div class="card" id="card">
  <img id="userImage">
  <img id="overlayImage" src="1ss.png">
</div>

<div class="controls">
  <input type="file" id="fileInput" accept="image/*"><br><br>

  <!-- 移動ボタン -->
  <button onclick="move(0,-1)">↑(細)</button>
  <button onclick="move(0,-5)">↑</button><br>

  <button onclick="move(-5,0)">←</button>
  <button onclick="move(-1,0)">←(細)</button>
  <button onclick="move(1,0)">→(細)</button>
  <button onclick="move(5,0)">→</button><br>

  <button onclick="move(0,5)">↓</button>
  <button onclick="move(0,1)">↓(細)</button>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const userImage = document.getElementById('userImage');
const card = document.getElementById('card');

let imgX = 0, imgY = 0;
let imgW = 0, imgH = 0;

function fitImage() {
  const cardW = card.clientWidth;
  const cardH = card.clientHeight;

  const imgRatio = userImage.naturalWidth / userImage.naturalHeight;
  const cardRatio = cardW / cardH;

  // cover状態でフィット（隙間防止）
  if (imgRatio > cardRatio) {
    imgH = cardH;
    imgW = imgH * imgRatio;
  } else {
    imgW = cardW;
    imgH = imgW / imgRatio;
  }

  imgX = (cardW - imgW) / 2;
  imgY = (cardH - imgH) / 2;

  applyTransform();
}

function applyTransform() {
  userImage.style.width = imgW + 'px';
  userImage.style.height = imgH + 'px';
  userImage.style.left = imgX + 'px';
  userImage.style.top = imgY + 'px';
}

function clampPosition() {
  const cardW = card.clientWidth;
  const cardH = card.clientHeight;

  // 横制限
  if (imgW > cardW) {
    imgX = Math.min(0, Math.max(cardW - imgW, imgX));
  } else {
    imgX = (cardW - imgW) / 2;
  }

  // 縦制限
  if (imgH > cardH) {
    imgY = Math.min(0, Math.max(cardH - imgH, imgY));
  } else {
    imgY = (cardH - imgH) / 2;
  }
}

function move(dx, dy) {
  imgX += dx;
  imgY += dy;
  clampPosition();
  applyTransform();
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    userImage.src = ev.target.result;
    userImage.onload = fitImage;
  };
  reader.readAsDataURL(file);
});

window.addEventListener('resize', () => {
  if (userImage.src) fitImage();
});
</script>

</body>
</html>
